<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 42px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .section { font: 700 20px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; letter-spacing: 1px; }
      .nodeTitle { font: 700 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .nodeText { font: 400 14px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #dbeafe; }
      .small { font: 400 13px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .legend { font: 600 14px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #e5e7eb; }
      .edge { stroke: #64748b; stroke-width: 3; fill: none; opacity: 0.8; }
      .edgeStrong { stroke: #38bdf8; stroke-width: 4; fill: none; opacity: 0.95; }
      .edgeDead { stroke: #f87171; stroke-width: 3; fill: none; opacity: 0.8; }
    </style>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#f87171"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="url(#bg)"/>

  <text x="72" y="76" class="title">crushr Format Evolution</text>
  <text x="72" y="108" class="subtitle">Selection, elimination, and the emergence of the current archive architecture</text>

  <!-- Legend -->
  <g transform="translate(1160,48)">
    <rect x="0" y="0" rx="18" ry="18" width="360" height="110" fill="#111827" stroke="#334155" stroke-width="1.5" opacity="0.95"/>
    <circle cx="28" cy="30" r="8" fill="#22c55e"/><text x="48" y="35" class="legend">Survived / validated</text>
    <circle cx="28" cy="58" r="8" fill="#f87171"/><text x="48" y="63" class="legend">Rejected / demoted</text>
    <circle cx="28" cy="86" r="8" fill="#94a3b8"/><text x="48" y="91" class="legend">Intermediate experiment / transition step</text>
  </g>

  <!-- Section labels -->
  <text x="90" y="200" class="section">ASSUMPTIONS</text>
  <text x="510" y="200" class="section">EXPERIMENTS</text>
  <text x="1110" y="200" class="section">OUTCOMES</text>

  <!-- Nodes -->
  <!-- Start -->
  <g filter="url(#shadow)">
    <rect x="70" y="250" rx="24" ry="24" width="280" height="120" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
    <circle cx="102" cy="282" r="9" fill="#94a3b8"/>
    <text x="122" y="288" class="nodeTitle">Initial assumption</text>
    <text x="92" y="318" class="nodeText">Metadata-centric archive design</text>
    <text x="92" y="342" class="nodeText">Integrity assumed to depend on</text>
    <text x="92" y="364" class="nodeText">surviving centralized metadata</text>
  </g>

  <!-- Main path -->
  <g filter="url(#shadow)">
    <rect x="450" y="250" rx="24" ry="24" width="290" height="100" fill="#1f2937" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="482" cy="282" r="9" fill="#22c55e"/>
    <text x="502" y="288" class="nodeTitle">FORMAT-05</text>
    <text x="472" y="318" class="nodeText">Self-identifying payload blocks</text>

    <rect x="450" y="390" rx="24" ry="24" width="290" height="100" fill="#1f2937" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="482" cy="422" r="9" fill="#22c55e"/>
    <text x="502" y="428" class="nodeTitle">FORMAT-07</text>
    <text x="472" y="458" class="nodeText">Graph-aware salvage reasoning</text>

    <rect x="450" y="530" rx="24" ry="24" width="290" height="100" fill="#1f2937" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="482" cy="562" r="9" fill="#94a3b8"/>
    <text x="502" y="568" class="nodeTitle">FORMAT-11</text>
    <text x="472" y="598" class="nodeText">Distributed extent identity</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="250" rx="24" ry="24" width="310" height="100" fill="#10243d" stroke="#38bdf8" stroke-width="2.5"/>
    <circle cx="852" cy="282" r="9" fill="#22c55e"/>
    <text x="872" y="288" class="nodeTitle">FORMAT-12</text>
    <text x="842" y="318" class="nodeText">Inline path identity</text>
    <text x="842" y="340" class="small">Named recovery restored, overhead measured</text>

    <rect x="820" y="390" rx="24" ry="24" width="310" height="100" fill="#10243d" stroke="#38bdf8" stroke-width="2.5"/>
    <circle cx="852" cy="422" r="9" fill="#22c55e"/>
    <text x="872" y="428" class="nodeTitle">FORMAT-13</text>
    <text x="842" y="458" class="nodeText">Dictionary indirection</text>
    <text x="842" y="480" class="small">Reduced size while preserving recovery</text>

    <rect x="820" y="530" rx="24" ry="24" width="310" height="100" fill="#10243d" stroke="#38bdf8" stroke-width="2.5"/>
    <circle cx="852" cy="562" r="9" fill="#22c55e"/>
    <text x="872" y="568" class="nodeTitle">FORMAT-14A</text>
    <text x="842" y="598" class="nodeText">Dictionary-target resilience</text>
    <text x="842" y="620" class="small">Mirror corruption and conflict behavior validated</text>
  </g>

  <!-- Dead branches -->
  <g filter="url(#shadow)">
    <rect x="430" y="700" rx="24" ry="24" width="320" height="135" fill="#24161b" stroke="#f87171" stroke-width="2.5"/>
    <circle cx="462" cy="732" r="9" fill="#f87171"/>
    <text x="482" y="738" class="nodeTitle">FORMAT-08 branch</text>
    <text x="450" y="768" class="nodeText">Placement strategies:</text>
    <text x="450" y="792" class="nodeText">fixed / hash / golden spread</text>
    <text x="450" y="818" class="small">Result: no measurable advantage</text>

    <rect x="810" y="700" rx="24" ry="24" width="320" height="135" fill="#24161b" stroke="#f87171" stroke-width="2.5"/>
    <circle cx="842" cy="732" r="9" fill="#f87171"/>
    <text x="862" y="738" class="nodeTitle">Manifest-heavy branch</text>
    <text x="830" y="768" class="nodeText">FORMAT-09 / FORMAT-10:</text>
    <text x="830" y="792" class="nodeText">metadata survivability audit</text>
    <text x="830" y="818" class="small">Result: heavy metadata too fragile / expensive</text>
  </g>

  <!-- Dictionary sub-branch -->
  <g filter="url(#shadow)">
    <rect x="1170" y="355" rx="24" ry="24" width="300" height="110" fill="#24161b" stroke="#f87171" stroke-width="2.5"/>
    <circle cx="1202" cy="387" r="9" fill="#f87171"/>
    <text x="1222" y="393" class="nodeTitle">Single dictionary</text>
    <text x="1192" y="423" class="nodeText">Smaller, but too fragile under</text>
    <text x="1192" y="445" class="nodeText">direct dictionary corruption</text>

    <rect x="1170" y="520" rx="24" ry="24" width="300" height="135" fill="#0f2f24" stroke="#22c55e" stroke-width="2.8"/>
    <circle cx="1202" cy="552" r="9" fill="#22c55e"/>
    <text x="1222" y="558" class="nodeTitle">Header + tail mirrors</text>
    <text x="1192" y="588" class="nodeText">Current architecture</text>
    <text x="1192" y="612" class="small">Named recovery if one copy survives</text>
    <text x="1192" y="634" class="small">Anonymous fallback if both are unavailable</text>
  </g>

  <!-- Edges -->
  <path d="M350 310 C395 310, 405 300, 450 300" class="edgeStrong" marker-end="url(#arrowBlue)"/>
  <path d="M595 350 C595 365, 595 375, 595 390" class="edgeStrong" marker-end="url(#arrowBlue)"/>
  <path d="M595 490 C595 505, 595 515, 595 530" class="edgeStrong" marker-end="url(#arrowBlue)"/>

  <path d="M740 580 C790 580, 770 300, 820 300" class="edgeStrong" marker-end="url(#arrowBlue)"/>
  <path d="M975 350 C975 365, 975 375, 975 390" class="edgeStrong" marker-end="url(#arrowBlue)"/>
  <path d="M975 490 C975 505, 975 515, 975 530" class="edgeStrong" marker-end="url(#arrowBlue)"/>

  <path d="M1130 440 C1150 440, 1150 410, 1170 410" class="edgeDead" marker-end="url(#arrowRed)"/>
  <path d="M1130 440 C1150 440, 1150 585, 1170 585" class="edgeStrong" marker-end="url(#arrowBlue)"/>

  <path d="M350 310 C420 310, 370 760, 430 760" class="edgeDead" marker-end="url(#arrowRed)"/>
  <path d="M350 310 C520 310, 560 760, 810 760" class="edgeDead" marker-end="url(#arrowRed)"/>

  <!-- Outcome callout -->
  <g filter="url(#shadow)">
    <rect x="70" y="860" rx="20" ry="20" width="1460" height="78" fill="#0b1220" stroke="#334155" stroke-width="1.5"/>
    <text x="100" y="906" class="subtitle">
      Result: crushr is not a straight-line iteration story. It is a destructive-selection story: distributed payload truth survived, heavy centralized metadata did not.
    </text>
  </g>
</svg>
