<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="540" viewBox="0 0 1000 540">
<rect width="1000" height="540" fill="#0b1020"/>
<rect x="40" y="40" width="920" height="460" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>
<text x="70" y="90" font-family="Inter,Segoe UI,Arial" font-size="30" font-weight="700" fill="#f8fafc">Conceptual archive layout</text>
<text x="70" y="120" font-family="Inter,Segoe UI,Arial" font-size="17" fill="#cbd5e1">The public format story is simple: local extent identity for payload truth, mirrored dictionaries for naming truth.</text>

<rect x="120" y="170" width="760" height="62" rx="18" fill="#10243d" stroke="#38bdf8" stroke-width="2.5"/>
<text x="150" y="208" font-family="Inter,Segoe UI,Arial" font-size="22" font-weight="700" fill="#f8fafc">Header</text>
<text x="290" y="208" font-family="Inter,Segoe UI,Arial" font-size="16" fill="#cbd5e1">archive identity • mirrored dictionary copy A</text>

<rect x="120" y="250" width="760" height="92" rx="18" fill="#132033" stroke="#38bdf8" stroke-width="2.5"/>
<text x="150" y="287" font-family="Inter,Segoe UI,Arial" font-size="22" font-weight="700" fill="#f8fafc">Extent region</text>
<text x="305" y="287" font-family="Inter,Segoe UI,Arial" font-size="16" fill="#cbd5e1">extent identity blocks • payload data • local verification truth</text>
<text x="150" y="315" font-family="Inter,Segoe UI,Arial" font-size="15" fill="#94a3b8">This is the main resilience surface.</text>

<rect x="120" y="360" width="760" height="62" rx="18" fill="#10243d" stroke="#38bdf8" stroke-width="2.5"/>
<text x="150" y="398" font-family="Inter,Segoe UI,Arial" font-size="22" font-weight="700" fill="#f8fafc">Tail frame</text>
<text x="300" y="398" font-family="Inter,Segoe UI,Arial" font-size="16" fill="#cbd5e1">mirrored dictionary copy B • closing integrity structures</text>

<text x="120" y="460" font-family="Inter,Segoe UI,Arial" font-size="15" fill="#cbd5e1">If one dictionary survives, named recovery remains possible. If both are unavailable, recovery downgrades honestly to anonymous mode.</text>
</svg>