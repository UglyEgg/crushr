<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <style>
      .title { font: 700 46px Inter,Segoe UI,Arial,sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 19px Inter,Segoe UI,Arial,sans-serif; fill: #cbd5e1; }
      .section { font: 700 18px Inter,Segoe UI,Arial,sans-serif; fill: #93c5fd; letter-spacing: 0.12em; }
      .nodeTitle { font: 700 20px Inter,Segoe UI,Arial,sans-serif; fill: #f8fafc; }
      .nodeText { font: 400 15px Inter,Segoe UI,Arial,sans-serif; fill: #dbeafe; }
      .small { font: 400 13px Inter,Segoe UI,Arial,sans-serif; fill: #cbd5e1; }
      .legend { font: 600 14px Inter,Segoe UI,Arial,sans-serif; fill: #e5e7eb; }
      .edgeBlue { stroke: #38bdf8; stroke-width: 4.5; fill: none; opacity: 0.95; }
      .edgeRed { stroke: #f87171; stroke-width: 4; fill: none; opacity: 0.92; stroke-dasharray: 12 10; }
      .edgeGray { stroke: #64748b; stroke-width: 3.5; fill: none; opacity: 0.85; }
    </style>
    <marker id="arrowBlue" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowRed" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#f87171"/>
    </marker>
    <marker id="arrowGray" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1800" height="1100" fill="url(#bg)"/>

  <text x="84" y="86" class="title">crushr Format Evolution</text>
  <text x="84" y="118" class="subtitle">Selection, elimination, and the emergence of the current archive architecture</text>

  <!-- Legend -->
  <g transform="translate(1300,40)">
    <rect x="0" y="0" rx="20" ry="20" width="420" height="126" fill="#0f172a" stroke="#334155" stroke-width="1.6" opacity="0.96"/>
    <circle cx="30" cy="34" r="8" fill="#22c55e"/>
    <text x="50" y="39" class="legend">Survived / validated</text>
    <circle cx="30" cy="66" r="8" fill="#94a3b8"/>
    <text x="50" y="71" class="legend">Intermediate transition step</text>
    <circle cx="30" cy="98" r="8" fill="#f87171"/>
    <text x="50" y="103" class="legend">Rejected / demoted / negative result</text>
  </g>

  <text x="94" y="200" class="section">ASSUMPTIONS</text>
  <text x="560" y="200" class="section">EXPERIMENTS</text>
  <text x="1210" y="200" class="section">OUTCOMES</text>

  <!-- Start node -->
  <g filter="url(#shadow)">
    <rect x="74" y="250" rx="26" ry="26" width="300" height="126" fill="#1e293b" stroke="#38bdf8" stroke-width="2.6"/>
    <circle cx="110" cy="286" r="9" fill="#94a3b8"/>
    <text x="132" y="292" class="nodeTitle">Initial assumption</text>
    <text x="96" y="326" class="nodeText">Metadata-centric archive design</text>
    <text x="96" y="350" class="nodeText">Container integrity presumed to</text>
    <text x="96" y="372" class="nodeText">depend on centralized metadata</text>
  </g>

  <!-- Main chain left -->
  <g filter="url(#shadow)">
    <rect x="470" y="235" rx="24" ry="24" width="320" height="96" fill="#172233" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="506" cy="268" r="9" fill="#22c55e"/>
    <text x="528" y="274" class="nodeTitle">FORMAT-05</text>
    <text x="492" y="305" class="nodeText">Self-identifying payload blocks</text>

    <rect x="470" y="375" rx="24" ry="24" width="320" height="96" fill="#172233" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="506" cy="408" r="9" fill="#22c55e"/>
    <text x="528" y="414" class="nodeTitle">FORMAT-07</text>
    <text x="492" y="445" class="nodeText">Graph-aware salvage reasoning</text>

    <rect x="470" y="515" rx="24" ry="24" width="320" height="96" fill="#172233" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="506" cy="548" r="9" fill="#94a3b8"/>
    <text x="528" y="554" class="nodeTitle">FORMAT-11</text>
    <text x="492" y="585" class="nodeText">Distributed extent identity</text>
  </g>

  <!-- Main chain right -->
  <g filter="url(#shadow)">
    <rect x="900" y="235" rx="24" ry="24" width="350" height="110" fill="#10243d" stroke="#38bdf8" stroke-width="2.6"/>
    <circle cx="938" cy="271" r="9" fill="#22c55e"/>
    <text x="960" y="277" class="nodeTitle">FORMAT-12</text>
    <text x="924" y="308" class="nodeText">Inline path identity</text>
    <text x="924" y="332" class="small">Named recovery restored, overhead measured</text>

    <rect x="900" y="390" rx="24" ry="24" width="350" height="110" fill="#10243d" stroke="#38bdf8" stroke-width="2.6"/>
    <circle cx="938" cy="426" r="9" fill="#22c55e"/>
    <text x="960" y="432" class="nodeTitle">FORMAT-13</text>
    <text x="924" y="463" class="nodeText">Dictionary indirection</text>
    <text x="924" y="487" class="small">Reduced size while preserving recovery</text>

    <rect x="900" y="545" rx="24" ry="24" width="350" height="110" fill="#10243d" stroke="#38bdf8" stroke-width="2.6"/>
    <circle cx="938" cy="581" r="9" fill="#22c55e"/>
    <text x="960" y="587" class="nodeTitle">FORMAT-14A</text>
    <text x="924" y="618" class="nodeText">Dictionary-target resilience</text>
    <text x="924" y="642" class="small">Mirror corruption and conflict behavior validated</text>
  </g>

  <!-- Dead branches bottom -->
  <g filter="url(#shadow)">
    <rect x="440" y="760" rx="24" ry="24" width="350" height="150" fill="#26161b" stroke="#f87171" stroke-width="2.4"/>
    <circle cx="478" cy="796" r="9" fill="#f87171"/>
    <text x="500" y="802" class="nodeTitle">FORMAT-08 branch</text>
    <text x="464" y="836" class="nodeText">Placement strategies:</text>
    <text x="464" y="862" class="nodeText">fixed / hash / golden spread</text>
    <text x="464" y="890" class="small">Rejected: no measurable advantage</text>

    <rect x="860" y="760" rx="24" ry="24" width="390" height="150" fill="#26161b" stroke="#f87171" stroke-width="2.4"/>
    <circle cx="898" cy="796" r="9" fill="#f87171"/>
    <text x="920" y="802" class="nodeTitle">Manifest-heavy branch</text>
    <text x="884" y="836" class="nodeText">FORMAT-09 / FORMAT-10 survivability audit</text>
    <text x="884" y="862" class="nodeText">Heavy metadata improved naming but remained</text>
    <text x="884" y="886" class="small">too fragile and too expensive to lead the design</text>
  </g>

  <!-- Dictionary sub-branches -->
  <g filter="url(#shadow)">
    <rect x="1338" y="370" rx="24" ry="24" width="340" height="120" fill="#26161b" stroke="#f87171" stroke-width="2.4"/>
    <circle cx="1376" cy="406" r="9" fill="#f87171"/>
    <text x="1398" y="412" class="nodeTitle">Single dictionary</text>
    <text x="1362" y="446" class="nodeText">Smaller, but too fragile under</text>
    <text x="1362" y="470" class="small">direct dictionary corruption</text>

    <rect x="1338" y="530" rx="24" ry="24" width="340" height="150" fill="#0e2d25" stroke="#22c55e" stroke-width="2.8"/>
    <circle cx="1376" cy="566" r="9" fill="#22c55e"/>
    <text x="1398" y="572" class="nodeTitle">Header + tail mirrors</text>
    <text x="1362" y="606" class="nodeText">Current lead architecture</text>
    <text x="1362" y="632" class="small">Named recovery if one copy survives</text>
    <text x="1362" y="656" class="small">Anonymous fallback if both are unavailable</text>
  </g>

  <!-- FORMAT-15 dead branch -->
  <g filter="url(#shadow)">
    <rect x="1338" y="720" rx="24" ry="24" width="360" height="170" fill="#26161b" stroke="#f87171" stroke-width="2.6"/>
    <circle cx="1376" cy="756" r="9" fill="#f87171"/>
    <text x="1398" y="762" class="nodeTitle">FORMAT-15</text>
    <text x="1362" y="796" class="nodeText">Factored dictionaries + generation-aware identity</text>
    <text x="1362" y="824" class="small">Preserved the same recovery behavior</text>
    <text x="1362" y="848" class="small">but did not reduce size enough to justify promotion</text>
    <text x="1362" y="874" class="small">Rejected as a lead replacement; useful negative result</text>
  </g>

  <!-- Edges -->
  <path d="M374 313 C420 313, 426 283, 470 283" class="edgeBlue" marker-end="url(#arrowBlue)"/>
  <path d="M630 331 C630 350, 630 356, 630 375" class="edgeBlue" marker-end="url(#arrowBlue)"/>
  <path d="M630 471 C630 488, 630 498, 630 515" class="edgeBlue" marker-end="url(#arrowBlue)"/>

  <path d="M790 563 C860 563, 838 290, 900 290" class="edgeBlue" marker-end="url(#arrowBlue)"/>
  <path d="M1075 345 C1075 360, 1075 372, 1075 390" class="edgeBlue" marker-end="url(#arrowBlue)"/>
  <path d="M1075 500 C1075 517, 1075 528, 1075 545" class="edgeBlue" marker-end="url(#arrowBlue)"/>

  <path d="M1250 445 C1290 445, 1295 430, 1338 430" class="edgeRed" marker-end="url(#arrowRed)"/>
  <path d="M1250 445 C1290 445, 1295 604, 1338 604" class="edgeBlue" marker-end="url(#arrowBlue)"/>
  <path d="M1508 680 C1508 698, 1508 702, 1508 720" class="edgeRed" marker-end="url(#arrowRed)"/>

  <path d="M374 313 C420 313, 390 820, 440 820" class="edgeRed" marker-end="url(#arrowRed)"/>
  <path d="M374 313 C650 313, 690 820, 860 820" class="edgeRed" marker-end="url(#arrowRed)"/>

  <!-- Outcome statement -->
  <g filter="url(#shadow)">
    <rect x="74" y="970" rx="22" ry="22" width="1646" height="86" fill="#0b1220" stroke="#334155" stroke-width="1.5"/>
    <text x="104" y="1018" class="subtitle">Result: crushr is not a straight-line iteration story. It is a destructive-selection story: distributed payload truth survived, heavy centralized metadata did not, and even later refinements had to earn promotion on measured results.</text>
  </g>
</svg>
