site_name: crushr
site_description: Salvage-oriented archive format and technical documentation
site_url: https://crushr.entropy.quest/
repo_name: UglyEgg/crushr
repo_url: https://github.com/UglyEgg/crushr
site_author: Richard Majewski - Varanid Works
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.webp
  favicon: assets/favicon.png
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - content.code.copy
    - content.action.edit

extra_css:
  - assets/stylesheets/theme.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.highlight

nav:
  - Welcome: index.md
  - Why crushr: why-crushr.md
  - Whitepaper:
      - Executive summary: whitepaper/index.md
      - Problem statement: whitepaper/problem-statement.md
      - Format architecture: whitepaper/architecture.md
      - Recovery and integrity model: whitepaper/recovery-model.md
      - Experimental evaluation: whitepaper/evaluation.md
      - Applicability and roadmap: whitepaper/applicability.md
  - Format evolution: format-evolution.md
  - Reference:
      - Architecture boundary: ARCHITECTURE.md
      - Snapshot format: SNAPSHOT_FORMAT.md
      - Testing harness: testing-harness.md
      - Foundational references: foundational_docs/index.md
      - Reference map: appendix/reference-map.md
