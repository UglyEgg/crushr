site_name: crushr
site_description: Integrity-first archival and salvage-first compression format documentation
site_url: https://crushr.entropy.quest/
repo_name: UglyEgg/crushr
repo_url: https://github.com/UglyEgg/crushr
site_author: Richard Majewski - Varanid Works
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.webp
  favicon: assets/favicon.png
  palette:
    # Default to dark mode. Provide a toggle for light mode.
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - content.code.copy

extra_css:
  - assets/stylesheets/theme.css

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.highlight

nav:
  - Welcome: index.md
  - Testing Harness: testing-harness.md
  - Format Evolution: format-evolution.md
